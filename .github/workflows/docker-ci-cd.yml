name: CI/CD Pipeline

on:
  push:
    branches:
      - main  # Change this to the branch you want to trigger the workflow on
  pull_request:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout Repository
        uses: actions/checkout@v2

      # Step 2: Set up Docker Buildx (for building Docker images)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      # Step 3: Log in to Docker Hub (use GitHub Secrets for credentials)
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build and push the backend Docker image
      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-app:latest

      # Step 5: Build and push the frontend Docker image
      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

      # Step 6: Deploy containers on EC2
      - name: Deploy Backend and Frontend Containers on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend-app:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
            docker stop backend-container || true && docker rm backend-container || true
            docker stop frontend-container || true && docker rm frontend-container || true
            docker run -d --name backend-container -p 8081:8080 ${{ secrets.DOCKER_USERNAME }}/backend-app:latest
            docker run -d --name frontend-container -p 3000:80 ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
